name: Deploy Public Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build (CI)
        run: npm run build:ci

      - name: Validate generated data
        run: |
          node --input-type=module -e "import fs from 'node:fs'; const items = JSON.parse(fs.readFileSync('./src/data/archive.json','utf8')); if (!Array.isArray(items) || items.length < 100) { console.error('archive.json looks invalid/too small:', Array.isArray(items) ? items.length : 'not-array'); process.exit(1); } console.log('archive.json items:', items.length);"

      - name: Validate secret
        run: |
          if [ -z "${{ secrets.PUBLIC_REPO_PAT }}" ]; then
            echo "PUBLIC_REPO_PAT is not set"
            exit 1
          fi

      - name: Deploy dist to public repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PUBLIC_REPO_PAT }}
          external_repository: goryugocast/goryugocom
          publish_dir: ./dist
          publish_branch: main
